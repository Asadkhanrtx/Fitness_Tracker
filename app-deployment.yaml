apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: gateway-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: fitness-tracker-app
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          resources:
            limits:
              memory: "512Mi"
              cpu: "200m"
            requests:
              memory: "256Mi"
              cpu: "100m"

          env:
            #  From ConfigMap
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: PORT

            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: HOST

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: NODE_ENV

            - name: DD_TRACE_AGENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: DD_TRACE_AGENT_PORT

            - name: DD_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: DD_ENV

            - name: DD_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: DD_SERVICE

            - name: DD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: fitness-config
                  key: DD_VERSION

            #  From Secret
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: fitness-secret
                  key: MONGODB_URI

            #  Dynamic (keep as-is)
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 5000
          #   initialDelaySeconds: 5
          #   periodSeconds: 5
          #   timeoutSeconds: 2
          #   failureThreshold: 3

          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 5000
          #   initialDelaySeconds: 10
          #   periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP