apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-config
  namespace: gateway-ns
data:
  PORT: "5000"
  HOST: "0.0.0.0"
  NODE_ENV: "production"
  DD_TRACE_AGENT_PORT: "8126"
  DD_ENV: "production"
  DD_SERVICE: "fitness-tracker-app"
  DD_VERSION: "1.0.0"

---
apiVersion: v1
kind: Secret
metadata:
  name: fitness-secret
  namespace: gateway-ns
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongodb-service:27017/fitness-tracker"