apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: fitness-tracker
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Asadkhanrtx/Fitness_Tracker.git
    targetRevision: master
    path: Fitness_Chart

  destination:
    server: https://kubernetes.default.svc
    namespace: fitness

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
