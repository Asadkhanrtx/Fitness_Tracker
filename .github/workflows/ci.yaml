name: Snyk Monitoring

on:
  push:
    branches:
      - master

jobs:
  snyk-monitor:
    name: Snyk Security Monitoring
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Install Snyk CLI
      - name: Install Snyk
        run: npm install -g snyk

      # 🔑 Authenticate Snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # 🔍 Run Snyk Scan (do NOT fail pipeline)
      - name: Run Snyk Test
        id: snyk-test
        run: |
          snyk test --severity-threshold=high > snyk-report.txt || echo "SNYK_FAILED=true" >> $GITHUB_ENV

      # 📧 Send Email ONLY if vulnerabilities found
      - name: Send email if vulnerabilities detected
        if: env.SNYK_FAILED == 'true'
        uses: hilarion5/send-mail@v1
        with:
          smtp-server: smtp.gmail.com
          smtp-port: 587
          smtp-secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from-email: ${{ secrets.EMAIL_USERNAME }}
          to-email: lijazsalim@gmail.com,asadchamp109@gmail.com,kajapathy07@gmail.com
          subject: "ALERT: Snyk Vulnerabilities Detected"
          html: |
            <h2 style="color:red;">Security Alert</h2>
            <p>Snyk detected vulnerabilities in dependencies.</p>

            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Branch:</b> ${{ github.ref_name }}</p>

            <p>Please review and fix the issues.</p>

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              View Full Report
            </a>
