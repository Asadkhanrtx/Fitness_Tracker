apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: gateway-ns
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      
      # ✅ MongoDB Container
      - name: mongodb
        image: mongo:7-jammy
        ports:
          - containerPort: 27017
        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        volumeMounts:
          - name: asad-data
            mountPath: /data/db

      # 🔥 Memory Eater Sidecar (causes OOM)
      - name: memory-eater
        image: bash
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Starting memory eater...";
            arr=();
            while true; do
              arr+=($(head -c 20M </dev/zero | tr '\0' 'a'));
              echo "Allocated 20MB";
              sleep 0.1;
            done
        resources:
          limits:
            memory: "300Mi"
            cpu: "100m"
          requests:
            memory: "100Mi"
            cpu: "50m"

      volumes:
        - name: asad-data
          emptyDir:
            sizeLimit: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: gateway-ns
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP